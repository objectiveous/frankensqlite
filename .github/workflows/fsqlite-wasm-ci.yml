name: fsqlite-wasm CI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the generated npm package to npmjs.org"
        required: false
        type: boolean
        default: false
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/fsqlite-wasm-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/fsqlite-wasm/**"
      - "scripts/build_fsqlite_wasm_package.sh"
      - "LICENSE"
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Add wasm target
        shell: bash
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          cargo install wasm-pack --locked

      - name: Install Binaryen
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Install twiggy
        shell: bash
        run: |
          set -euo pipefail
          cargo install twiggy --locked

      - name: Run host tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p fsqlite-wasm --locked -- --nocapture

      - name: Verify wasm32 build
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p fsqlite-wasm --locked --target wasm32-unknown-unknown --release

      - name: Build and pack npm artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_root="artifacts/fsqlite-wasm"
          pkg_dir="${artifact_root}/pkg"

          mkdir -p "${artifact_root}"
          FSQLITE_WASM_TWIGGY=required ./scripts/build_fsqlite_wasm_package.sh "${pkg_dir}"

          size_report="${pkg_dir}/size-report.json"
          if [[ ! -f "${size_report}" ]]; then
            echo "Expected size report at ${size_report}" >&2
            exit 1
          fi

          package_name="$(jq -r '.packageName' "${size_report}")"
          build_target="$(jq -r '.buildTarget' "${size_report}")"
          profile="$(jq -r '.profile' "${size_report}")"
          strip_location_detail="$(jq -r '.stripLocationDetail' "${size_report}")"
          wasm_opt_mode="$(jq -r '.wasmOpt.mode' "${size_report}")"
          packed_file="$(jq -r '.packedArchive // ""' "${size_report}")"
          wasm_bytes="$(jq -r '.wasmBytes' "${size_report}")"
          wasm_gzip_bytes="$(jq -r '.wasmGzipBytes' "${size_report}")"
          max_gzip_bytes="$(jq -r '.maxGzipBytes' "${size_report}")"
          gzip_budget_pass="$(jq -r '.gzipBudgetPass' "${size_report}")"
          packed_bytes="$(jq -r '.packedBytes // ""' "${size_report}")"
          max_packed_bytes="$(jq -r '.maxPackedBytes' "${size_report}")"
          packed_budget_pass="$(jq -r '.packedBudgetPass // ""' "${size_report}")"
          wasm_opt_kept="$(jq -r '.wasmOpt.kept // "not-run"' "${size_report}")"
          twiggy_report="$(jq -r '.twiggyReport // ""' "${size_report}")"
          twiggy_report_path=""
          if [[ -n "${twiggy_report}" ]]; then
            twiggy_report_path="${pkg_dir}/${twiggy_report}"
          fi

          {
            echo "# fsqlite-wasm package summary"
            echo
            echo "- cargo_package: \`fsqlite-wasm\`"
            echo "- npm_package_name: \`${package_name}\`"
            echo "- npm_package_dir: \`${pkg_dir}\`"
            echo "- size_report: \`${size_report}\`"
            echo "- build_target: \`${build_target}\`"
            echo "- profile: \`${profile}\`"
            echo "- wasm_opt: \`${wasm_opt_mode}\`"
            echo "- wasm_opt_kept: \`${wasm_opt_kept}\`"
            echo "- strip_location_detail: \`${strip_location_detail}\`"
            echo "- wasm_bytes: \`${wasm_bytes}\`"
            echo "- wasm_gzip_bytes: \`${wasm_gzip_bytes}\`"
            echo "- max_gzip_bytes: \`${max_gzip_bytes}\`"
            echo "- gzip_budget_pass: \`${gzip_budget_pass}\`"
            echo "- packed_archive: \`${packed_file}\`"
            echo "- packed_bytes: \`${packed_bytes}\`"
            echo "- max_packed_bytes: \`${max_packed_bytes}\`"
            echo "- packed_budget_pass: \`${packed_budget_pass}\`"
            echo "- twiggy_report: \`${twiggy_report_path}\`"
            echo
            echo "## Generated files"
            while IFS= read -r artifact; do
              echo "- \`${artifact}\`"
            done < <(find "${artifact_root}" -maxdepth 2 -type f | sort)
          } > "${artifact_root}/summary.md"

      - name: Upload fsqlite-wasm artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsqlite-wasm-package
          path: artifacts/fsqlite-wasm/
          retention-days: 21

  npm-publish:
    needs: build-test-package
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download fsqlite-wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: fsqlite-wasm-package
          path: artifacts/fsqlite-wasm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish npm package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN is required for publish flows." >&2
            exit 1
          fi

          pkg_dir="artifacts/fsqlite-wasm/pkg"
          if [[ ! -f "${pkg_dir}/package.json" ]]; then
            echo "Expected package metadata at ${pkg_dir}/package.json" >&2
            exit 1
          fi

          pushd "${pkg_dir}" >/dev/null
          npm publish --provenance --access public
          popd >/dev/null
